in_source: |
  VARIABLE STR-ADDR
  : PRINT 
      DUP @ SWAP 1 + SWAP 
      BEGIN DUP 0 > WHILE OVER @ 1 OUT SWAP 1 + SWAP 1 -
      REPEAT DROP DROP ;
  : MAIN P"Hello World!" PRINT ;
  MAIN
in_input: ''
in_limit: 100000
out_stdout: Hello World!
