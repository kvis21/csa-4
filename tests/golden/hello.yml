in_source: |
  VARIABLE STR-ADDR
  : PRINT 
      DUP @ SWAP 1 + SWAP 
      BEGIN DUP 0 > WHILE OVER @ 1 OUT SWAP 1 + SWAP 1 -
      REPEAT DROP DROP ;
  : MAIN P"Hello World!" PRINT ;
  MAIN
in_input: ''
in_limit: 100000
out_stdout_hex: 48 65 6C 6C 6F 20 57 6F 72 6C 64 21
out_stdout_dec: 72 101 108 108 111 32 87 111 114 108 100 33
out_stdout_sym: Hello World!
