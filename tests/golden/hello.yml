in_source: "VARIABLE STR-ADDR
: PRINT 
  DUP @ SWAP 1 + SWAP 
    BEGIN DUP
      \ 0 > WHILE OVER @ 1 OUT SWAP 1 + SWAP 1 -\n    REPEAT DROP DROP ;\n: MAIN P\"\
  Hello World!\" PRINT ;\nMAIN\n"
