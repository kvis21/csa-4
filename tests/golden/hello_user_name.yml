in_source: |
  VARIABLE BUF
  : PRINT DUP @ SWAP 1 + SWAP BEGIN DUP 0 > WHILE OVER @ 1 OUT SWAP 1 + SWAP 1 - REPEAT DROP DROP ;
  : READ-NAME BUF 1 + BEGIN 0 IN DUP 10 = IF DROP 1 ELSE OVER ! 1 + 0 THEN UNTIL BUF - 1 - BUF ! ;
  : MAIN P" What is your name? " PRINT READ-NAME P" Hello, " PRINT BUF PRINT P"!" PRINT ;
  MAIN
in_input: |
  10 A
  20 l
  30 i
  40 c
  50 e
  60 \n

in_limit: 20000
out_stdout: ' What is your name?  Hello, Alice!'
