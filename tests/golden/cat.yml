in_source: |
  : MAIN
      BEGIN 
          0 IN        \ Читаем символ из порта 0
          DUP 0 >     \ Проверяем, что код > 0
      WHILE 
          1 OUT       \ Выводим символ в порт 1
      REPEAT 
      DROP            \ Удаляем 0 со стека
  ;
  MAIN
in_input: |
  1 t
  2 e
  3 s
  4 t
  5 0
in_limit: 1000
out_stdout: test
out_code_log: |
  === Instruction Memory (IMEM) ===
