  0016 - 0x224C0001 - ADD   R1, R1, #1
  0017 - 0x64400000 - PUSH  R1                       ; GT: push flag
  0018 - 0x66400000 - POP   R1                       ; WHILE: pop condition
  0019 - 0x2C080000 - CMP   R1, R0                   ; WHILE: CMP with 0
  001A - 0x42000022 - BEQ   34                       ; WHILE: BEQ exit loop if false
  001B - 0x00400000 - LUI   R1, #0                   ; PUSH 1
  001C - 0x224C0001 - ADD   R1, R1, #1               ; ADD #1 (const 1)
  001D - 0x64400000 - PUSH  R1                       ; PUSH 1
  001E - 0x66800000 - POP   R2                       ; OUT: pop port_num
  001F - 0x66400000 - POP   R1                       ; OUT: pop val
  0020 - 0x82400001 - OUT   R1, #1                   ; OUT: OUT R1, #1
  0021 - 0x40000002 - JMP   2                        ; REPEAT: JMP back to BEGIN
  0022 - 0x66400000 - POP   R1                       ; DROP
  0023 - 0x62000000 - RET                            ; RET from MAIN
