  0006 - 0x80400000 - IN    R1, #0                   ; IN: IN R1, #0
  0007 - 0x64400000 - PUSH  R1                       ; IN: push val
  0008 - 0x66400000 - POP   R1                       ; DUP: pop TOS
  0009 - 0x64400000 - PUSH  R1                       ; DUP: push copy 1
