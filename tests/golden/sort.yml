in_source: |
  VARIABLE I
  VARIABLE J
  VARIABLE ADDR1
  VARIABLE ADDR2
  VARIABLE V1
  VARIABLE V2
  VARIABLE ARR
  : READ-ARR 0 IN ARR ! 0 BEGIN DUP ARR @ < WHILE 0 IN OVER ARR + 1 + ! 1 + REPEAT DROP ;
  : BUBBLE-SORT 0 I ! BEGIN I @ ARR @ 1 - < WHILE 0 J ! BEGIN J @ ARR @ 1 - I @ - < WHILE ARR 1 + J @ + ADDR1 ! ARR 2 + J @ + ADDR2 ! ADDR1 @ @ ADDR2 @ @ > IF ADDR1 @ @ V1 ! ADDR2 @ @ V2 ! V1 @ ADDR2 @ ! V2 @ ADDR1 @ ! THEN J @ 1 + J ! REPEAT I @ 1 + I ! REPEAT ;
  : PRINT-ARR 0 I ! BEGIN I @ ARR @ < WHILE ARR 1 + I @ + @ 1 OUT I @ 1 + I ! REPEAT ;
  : MAIN READ-ARR BUBBLE-SORT PRINT-ARR ;
  MAIN
