in_source: |
  VARIABLE ADDR1
  VARIABLE ADDR2
  VARIABLE V1
  VARIABLE V2
  VARIABLE ARR
  : READ-ARR 0 IN ARR ! ARR @ 0 DO 0 IN 100 I + ! LOOP ;
  : BUBBLE-SORT ARR @ 1 - 0 DO ARR @ 1 - I - 0 DO 100 I + ADDR1 ! 101 I + ADDR2 ! ADDR1 @ @ ADDR2 @ @ > IF ADDR1 @ @ V1 ! ADDR2 @ @ V2 ! V1 @ ADDR2 @ ! V2 @ ADDR1 @ ! THEN LOOP LOOP ;
  : PRINT-ARR ARR @ 0 DO 100 I + @ 1 OUT LOOP ;
  : MAIN READ-ARR BUBBLE-SORT PRINT-ARR ;
  MAIN
in_input: |
  10 5
  20 9
  30 3
  40 7
  50 1
  60 4
in_limit: 40000
out_stdout_hex: 01 03 04 07 09
out_stdout_dec: 1 3 4 7 9
out_stdout_sym: "\x01\x03\x04\a\t"
