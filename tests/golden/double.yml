in_source: |
  VARIABLE AL
  VARIABLE AH
  VARIABLE BL
  VARIABLE BH
  VARIABLE SL
  VARIABLE SH
  : DADD BH ! BL ! AH ! AL ! AL @ BL @ + SL ! AH @ BH @ + SH ! SL @ AL @ < IF SH @ 1 + SH ! THEN SL @ SH @ ;
  : DSUB BH ! BL ! AH ! AL ! AL @ BL @ - SL ! AH @ BH @ - SH ! AL @ BL @ < IF SH @ 1 - SH ! THEN SL @ SH @ ;
  : MAIN 100000 0 200000 0 DADD 1 OUT 1 OUT 500000 1 200000 0 DSUB 1 OUT 1 OUT ;
  MAIN
in_input: ""
in_limit: 150000
out_stdout_hex: ['00', 493E0, '01', 493E0]
out_stdout_dec: ['0', '300000', '1', '300000']
out_stdout_sym: "\0\U000493E0\x01\U000493E0"
