  : DO-SOMETHING 999 1 OUT ;
  : MAIN 0 COUNTER ! ' MY-ISR SET-ISR EI ' DO-SOMETHING EXECUTE BEGIN COUNTER @ 0 = WHILE REPEAT ;
  MAIN
